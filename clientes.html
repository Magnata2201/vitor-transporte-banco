<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logística - Cadastro de Clientes</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="icon.ico">
    <style>
        .acoes-flex { display: flex; gap: 5px; }
        .btn-edit { background-color: #ffc107; color: #000; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 11px; }
        .btn-pequeno { padding: 5px 10px; font-size: 11px; }
        #tabelaClientes { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 13px; }
        #tabelaClientes th, #tabelaClientes td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        #tabelaClientes th { background-color: #f8f9fa; }
    </style>
</head>
<body>

    <nav class="top-nav">
        <ul>
            <li><a href="index.html">🚀 Iniciar Viagem</a></li>
            <li><a href="produtos.html">📦 Produtos</a></li>
            <li><a href="clientes.html" class="active">👥 Clientes</a></li>
            <li><a href="motoristas.html">🚚 Motoristas</a></li>
            <li><a href="financeiro.html">💲 Financeiro</a></li>
            <li><a href="etiquetas.html">🏷️ Etiquetas</a></li>
            <li><a href="romaneios_salvos.html">📋 Romaneios Salvos</a></li>
        </ul>
    </nav>

    <div class="container">
        <h1>👥 Cadastro de Clientes</h1>
        <p>Cadastre os dados completos para emissão de romaneios e financeiro.</p>

        <form id="formCadastroCliente">
            <input type="hidden" id="editIndex" value="-1">
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="form-group">
                    <label for="nomeCliente">Nome do Cliente / Loja:</label>
                    <input type="text" id="nomeCliente" required placeholder="Ex: Mercado Central">
                </div>
                <div class="form-group">
                    <label for="documentoCliente">CPF / CNPJ:</label>
                    <input type="text" id="documentoCliente" placeholder="00.000.000/0000-00">
                </div>
            </div>

            <div class="form-group">
                <label for="enderecoCliente">Endereço Completo:</label>
                <input type="text" id="enderecoCliente" required placeholder="Rua, Número, Bairro, Cidade">
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="form-group">
                    <label for="telefoneCliente">Telefone:</label>
                    <input type="text" id="telefoneCliente" placeholder="(00) 00000-0000">
                </div>
                <div class="form-group">
                    <label for="valorCaixa">Valor da Caixa (R$):</label>
                    <input type="number" id="valorCaixa" step="0.01" placeholder="0,00">
                </div>
            </div>

            <button type="submit" id="btnSalvar">Salvar Cliente</button>
            <button type="button" id="btnCancelar" style="display: none; background-color: #6c757d;">Cancelar Edição</button>
        </form>

        <table id="tabelaClientes">
            <thead>
                <tr>
                    <th>Nome / Loja</th>
                    <th>CPF/CNPJ</th>
                    <th>Endereço</th>
                    <th>Telefone</th>
                    <th>Vl. Caixa</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody>
                </tbody>
        </table>
    </div>

    <script type="module">
        import { db, collection, addDoc, getDocs, doc, updateDoc, deleteDoc } from './firebase-config.js';

        const form = document.getElementById('formCadastroCliente');
        const tbody = document.querySelector('#tabelaClientes tbody');
        const editIndexInput = document.getElementById('editIndex');
        const btnCancelar = document.getElementById('btnCancelar');
        const btnSalvar = document.getElementById('btnSalvar');

        let listaDeClientes = [];

        async function renderizarTabela() {
            tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;">Carregando...</td></tr>';
            listaDeClientes = [];
            
            try {
                const querySnapshot = await getDocs(collection(db, "clientes"));
                tbody.innerHTML = '';
                
                querySnapshot.forEach((doc) => {
                    listaDeClientes.push({ id: doc.id, ...doc.data() });
                });

                listaDeClientes.sort((a, b) => a.nome.localeCompare(b.nome));

                listaDeClientes.forEach((cliente, index) => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td><strong>${cliente.nome}</strong></td>
                        <td>${cliente.documento || '---'}</td>
                        <td>${cliente.endereco}</td>
                        <td>${cliente.telefone || '---'}</td>
                        <td>R$ ${cliente.valorCaixa || '0,00'}</td>
                        <td class="acoes-flex">
                            <button class="btn-edit" data-index="${index}">Editar</button>
                            <button class="btn-danger btn-pequeno" data-index="${index}">Excluir</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            } catch (e) {
                tbody.innerHTML = '<tr><td colspan="6">Erro ao carregar dados.</td></tr>';
            }
        }

        form.addEventListener('submit', async function(e) {
            e.preventDefault();

            const idDoc = editIndexInput.value;
            const dadosCliente = { 
                nome: document.getElementById('nomeCliente').value,
                documento: document.getElementById('documentoCliente').value,
                endereco: document.getElementById('enderecoCliente').value,
                telefone: document.getElementById('telefoneCliente').value,
                valorCaixa: document.getElementById('valorCaixa').value,
                atualizadoEm: new Date().toISOString()
            };

            try {
                if (idDoc !== "-1") {
                    await updateDoc(doc(db, "clientes", idDoc), dadosCliente);
                    alert('Cliente atualizado!');
                } else {
                    await addDoc(collection(db, "clientes"), dadosCliente);
                    alert('Cliente salvo com sucesso!');
                }
                resetarFormulario();
                renderizarTabela();
            } catch (e) {
                alert("Erro ao salvar.");
            }
        });

        tbody.addEventListener('click', async function(e) {
            const index = e.target.dataset.index;
            if (index === undefined) return;
            const cliente = listaDeClientes[index];

            if (e.target.classList.contains('btn-edit')) {
                document.getElementById('nomeCliente').value = cliente.nome;
                document.getElementById('documentoCliente').value = cliente.documento || '';
                document.getElementById('enderecoCliente').value = cliente.endereco;
                document.getElementById('telefoneCliente').value = cliente.telefone || '';
                document.getElementById('valorCaixa').value = cliente.valorCaixa || '';
                editIndexInput.value = cliente.id;
                btnSalvar.textContent = "Confirmar Alteração";
                btnCancelar.style.display = "inline-block";
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }

            if (e.target.classList.contains('btn-danger')) {
                if (confirm(`Excluir "${cliente.nome}"?`)) {
                    await deleteDoc(doc(db, "clientes", cliente.id));
                    renderizarTabela();
                }
            }
        });

        function resetarFormulario() {
            form.reset();
            editIndexInput.value = "-1";
            btnSalvar.textContent = "Salvar Cliente";
            btnCancelar.style.display = "none";
        }

        btnCancelar.addEventListener('click', resetarFormulario);
        document.addEventListener('DOMContentLoaded', renderizarTabela);
    </script>
</body>
</html>
