<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logística - Romaneio Final</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="icon.ico">
    <style>
        @media print {
            button, .no-print { display: none !important; }
            .container { width: 100%; margin: 0; padding: 0; }
        }
        .cliente-romaneio { border: 1px solid #000; padding: 15px; margin-bottom: 20px; page-break-inside: avoid; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #000; padding: 8px; text-align: left; font-size: 13px; }
        th { background: #f2f2f2; }
    </style>
</head>
<body>
    
    <div class="container">
        <div class="no-print" style="margin-bottom: 20px;">
            <button onclick="window.location.href='carga.html'" style="padding: 10px; cursor: pointer;">← Voltar para Edição</button>
        </div>

        <div id="romaneioConteudo">
            <h1 style="text-align: center;">ROMANEIO DE CARGA</h1>
            <div id="cabecalhoViagem" style="margin-bottom: 20px; border-bottom: 2px solid #000; padding-bottom: 10px;"></div>
            <div id="listaClientesRomaneio"></div>
        </div>

        <div class="no-print" style="margin-top: 30px; display: flex; gap: 15px;">
            <button id="btnSalvarFirebase" style="flex: 1; padding: 20px; background: #28a745; color: white; font-weight: bold; border: none; border-radius: 8px; cursor: pointer; font-size: 16px;">
                💾 SALVAR ALTERAÇÕES E FINALIZAR
            </button>
            
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCwLzjKJXDCf-9UNNT1X5fzvEgFIc1Hh24",
            authDomain: "meu-banco-2201.firebaseapp.com",
            projectId: "meu-banco-2201",
            storageBucket: "meu-banco-2201.firebasestorage.app",
            messagingSenderId: "601801632834",
            appId: "1:601801632834:web:580e9106f6796ffbe311db"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const viagemAtual = JSON.parse(localStorage.getItem('viagemAtual'));

        if (!viagemAtual) {
            alert("Nenhum dado encontrado!");
            window.location.href = 'index.html';
        }

        function renderizarPagina() {
            // Cabeçalho
            document.getElementById('cabecalhoViagem').innerHTML = `
                <p><strong>Motorista:</strong> ${viagemAtual.motorista.toUpperCase()} | <strong>Placa:</strong> ${viagemAtual.placa || '---'}</p>
                <p><strong>Rota:</strong> ${viagemAtual.rota} | <strong>Data:</strong> ${new Date().toLocaleDateString('pt-BR')}</p>
                <p><strong>Valor Total da Carga:</strong> R$ ${viagemAtual.valorTotal}</p>
            `;

            // Clientes e Produtos
            const lista = document.getElementById('listaClientesRomaneio');
            lista.innerHTML = viagemAtual.clientes.map(cliente => `
                <div class="cliente-romaneio">
                    <h3>CLIENTE: ${cliente.nome}</h3>
                    <table>
                        <thead>
                            <tr>
                                <th>QTD</th>
                                <th>PRODUTO</th>
                                <th>FORNECEDOR</th>
                                <th>UNIT.</th>
                                <th>MODO</th>
                                <th>TOTAL</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${cliente.produtos.map(p => `
                                <tr>
                                    <td>${p.qtd}</td>
                                    <td>${p.nome}</td>
                                    <td>${p.fornecedor || '---'}</td>
                                    <td>R$ ${p.valor}</td>
                                    <td>${p.modoPreco}</td>
                                    <td>R$ ${p.totalCalculado}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `).join('');
        }

        // LÓGICA DE SALVAMENTO SEM DUPLICAR
        document.getElementById('btnSalvarFirebase').onclick = async function() {
            const btn = this;
            btn.disabled = true;
            btn.innerHTML = "⏳ Salvando...";

            try {
                // Preparamos os dados (removendo IDs temporários do objeto para não sujar o banco)
                const { editandoId, ...dadosParaSalvar } = viagemAtual;
                dadosParaSalvar.dataSalva = new Date().toISOString();

                if (viagemAtual.editandoId) {
                    // SE JÁ EXISTE ID, USAMOS O SETDOC PARA SOBRESCREVER (EDITAR)
                    await setDoc(doc(db, "romaneios", viagemAtual.editandoId), dadosParaSalvar);
                    alert("Romaneio ATUALIZADO com sucesso!");
                } else {
                    // SE NÃO EXISTE ID, CRIA UM NOVO
                    await addDoc(collection(db, "romaneios"), dadosParaSalvar);
                    alert("Novo romaneio SALVO com sucesso!");
                }

                localStorage.removeItem('viagemAtual');
                window.location.href = 'romaneios_salvos.html';

            } catch (e) {
                console.error(e);
                alert("Erro ao salvar: " + e.message);
                btn.disabled = false;
                btn.innerHTML = "💾 SALVAR ALTERAÇÕES E FINALIZAR";
            }
        };

        renderizarPagina();
    </script>
</body>
</html>
