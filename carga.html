<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logística - Montagem da Carga</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="icon.ico">
    <style>
        .bloco-cliente { background: #fff; border: 1px solid #dee2e6; border-radius: 8px; padding: 20px; margin-bottom: 20px; }
        .bloco-cliente table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.9em; }
        .bloco-cliente th, .bloco-cliente td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        .btn-danger { background-color: #dc3545; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; }
        
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.6); }
        .modal-content { background-color: #fff; margin: 10% auto; padding: 20px; border-radius: 8px; width: 80%; max-width: 500px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .search-box { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; font-size: 16px; }
        
        .lista-selecao-modal { list-style: none; padding: 0; max-height: 300px; overflow-y: auto; border: 1px solid #eee; }
        .lista-selecao-modal li { padding: 12px; border-bottom: 1px solid #eee; cursor: pointer; transition: 0.2s; }
        .lista-selecao-modal li:hover { background-color: #f1f1f1; color: #007bff; }
        .fechar-modal { float: right; font-size: 24px; font-weight: bold; cursor: pointer; color: #666; }
        
        .btn-escolher { background-color: #007bff; color: #fff; border: none; padding: 10px; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .btn-escolher.selecionado { background-color: #6c757d; }
    </style>
</head>
<body>
    
    <div class="container">
        <a href="index.html" style="text-decoration: none; color: #666;">← Voltar</a>
        <h1>📦 Montagem da Carga</h1>
        <div id="avisoEdicao" style="display:none; background:#fff3cd; color:#856404; padding:10px; border-radius:5px; margin-bottom:10px; border:1px solid #ffeeba; font-weight:bold; text-align:center;">
            ⚠️ MODO EDIÇÃO: Você está alterando um romaneio existente.
        </div>
        <div id="infoViagem">Carregando dados da viagem...</div>
        <hr>

        <form id="formAddCliente">
            <div class="form-group">
                <label>Selecione um Cliente para a Rota:</label>
                <select id="selectCliente" required>
                    <option value="" disabled selected>Buscando clientes no Firebase...</option>
                </select>
            </div>
            <button type="submit">Adicionar Cliente à Rota</button>
        </form>

        <div id="listaClientesContainer"></div>

        <button id="btnFinalizar" style="width: 100%; font-size: 18px; background-color: #28a745; color: white; padding: 15px; border: none; border-radius: 8px; cursor: pointer; margin-top: 20px;">
            Finalizar Carga e Gerar Romaneio
        </button>
    </div>

    <div id="modalProduto" class="modal">
        <div class="modal-content">
            <span class="fechar-modal" id="btnFecharModal">&times;</span>
            <h3>Escolha o Produto</h3>
            <input type="text" id="inputBusca" class="search-box" placeholder="Digite o nome do produto...">
            <ul id="listaProdutosModal" class="lista-selecao-modal"></ul>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCwLzjKJXDCf-9UNNT1X5fzvEgFIc1Hh24",
            authDomain: "meu-banco-2201.firebaseapp.com",
            projectId: "meu-banco-2201",
            storageBucket: "meu-banco-2201.firebasestorage.app",
            messagingSenderId: "601801632834",
            appId: "1:601801632834:web:580e9106f6796ffbe311db"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let listaDeProdutos = [];
        let listaDeClientes = [];
        let viagemAtual = JSON.parse(localStorage.getItem('viagemAtual'));
        let formAlvo = null;

        if (!viagemAtual) { window.location.href = 'index.html'; }

        if (viagemAtual.editandoId) {
            document.getElementById('avisoEdicao').style.display = 'block';
        }

        window.abrirModal = (formElement) => {
            formAlvo = formElement;
            document.getElementById('modalProduto').style.display = "block";
            document.getElementById('inputBusca').value = "";
            document.getElementById('inputBusca').focus();
            filtrarProdutos();
        };

        document.getElementById('btnFecharModal').onclick = () => { document.getElementById('modalProduto').style.display = "none"; };
        document.getElementById('inputBusca').onkeyup = filtrarProdutos;

        function filtrarProdutos() {
            const termo = document.getElementById('inputBusca').value.toLowerCase();
            const listaUl = document.getElementById('listaProdutosModal');
            listaUl.innerHTML = "";
            
            listaDeProdutos.filter(p => p.nome.toLowerCase().includes(termo)).forEach(p => {
                const li = document.createElement('li');
                li.textContent = p.nome;
                li.onclick = () => {
                    formAlvo.querySelector('.produto-nome-hidden').value = p.nome;
                    formAlvo.querySelector('.btn-escolher').textContent = p.nome;
                    formAlvo.querySelector('.btn-escolher').classList.add('selecionado');
                    document.getElementById('modalProduto').style.display = "none";
                };
                listaUl.appendChild(li);
            });
        }

        async function carregarDadosFirebase() {
            try {
                const snapClientes = await getDocs(collection(db, "clientes"));
                listaDeClientes = [];
                snapClientes.forEach(doc => listaDeClientes.push(doc.data()));
                listaDeClientes.sort((a,b) => a.nome.localeCompare(b.nome));

                const snapProdutos = await getDocs(collection(db, "produtos"));
                listaDeProdutos = [];
                snapProdutos.forEach(doc => listaDeProdutos.push(doc.data()));
                listaDeProdutos.sort((a,b) => a.nome.localeCompare(b.nome));

                atualizarSelectClientes();
                renderizarClientes();
                calcularValorTotal();
            } catch (e) { console.error(e); }
        }

        function atualizarSelectClientes() {
            const formAdd = document.getElementById('formAddCliente');
            const select = document.getElementById('selectCliente');
            
            // Bloqueio de 1 Cliente por Romaneio
            if (viagemAtual.clientes.length >= 1) {
                formAdd.style.display = 'none';
            } else {
                formAdd.style.display = 'block';
                select.innerHTML = '<option value="" disabled selected>-- Selecione um Cliente --</option>';
                listaDeClientes.forEach(cliente => {
                    const opt = document.createElement('option');
                    opt.value = cliente.nome; opt.textContent = cliente.nome;
                    select.appendChild(opt);
                });
            }
        }

        function calcularValorTotal() {
            let totalGeral = 0;
            viagemAtual.clientes.forEach(cliente => {
                cliente.produtos.forEach(produto => { totalGeral += parseFloat(produto.totalCalculado) || 0; });
            });
            viagemAtual.valorTotal = totalGeral.toFixed(2);
            document.getElementById('infoViagem').innerHTML = `Motorista: <strong>${viagemAtual.motorista}</strong> | Rota: <strong>${viagemAtual.rota}</strong> | Total: <strong>R$ ${viagemAtual.valorTotal.replace('.', ',')}</strong>`;
            
            localStorage.setItem('viagemAtual', JSON.stringify(viagemAtual));
        }

        window.removerProduto = (cIdx, pIdx) => { 
            viagemAtual.clientes[cIdx].produtos.splice(pIdx, 1); 
            calcularValorTotal(); 
            renderizarClientes(); 
        };

        window.removerCliente = (idx) => { 
            if(confirm("Remover cliente?")){ 
                viagemAtual.clientes.splice(idx, 1); 
                atualizarSelectClientes(); 
                calcularValorTotal(); 
                renderizarClientes(); 
            }
        };

        window.calcularVolume = (formElement) => {
            const qtdInput = formElement.querySelector('.produto-qtd');
            const modoSelect = formElement.querySelector('.modo-preco');
            const volInput = formElement.querySelector('.produto-volumes');

            const qtd = parseFloat(qtdInput.value) || 0;
            const modo = modoSelect.value;
            let volume = qtd;

            if (modo.startsWith('X')) {
                const multi = parseFloat(modo.replace('X', ''));
                volume = qtd * multi;
            } else if (modo.startsWith('÷')) {
                const divi = parseFloat(modo.replace('÷', ''));
                if(divi !== 0) volume = qtd / divi;
            }

            volInput.value = Number.isInteger(volume) ? volume : volume.toFixed(1);
        };

        window.renderizarClientes = () => {
            const container = document.getElementById('listaClientesContainer');
            container.innerHTML = ''; 

            viagemAtual.clientes.forEach((cliente, idxCli) => {
                const div = document.createElement('div');
                div.className = 'bloco-cliente';
                let rows = '';
                cliente.produtos.forEach((p, idxProd) => {
                    rows += `<tr>
                        <td>${p.qtd}</td>
                        <td>${p.nome}</td>
                        <td>${p.fornecedor || '---'}</td>
                        <td>R$ ${parseFloat(p.valor).toFixed(2).replace('.',',')}</td>
                        <td>${p.modoPreco}</td>
                        <td>${p.volumes}</td>
                        <td><strong>R$ ${parseFloat(p.totalCalculado).toFixed(2).replace('.',',')}</strong></td>
                        <td><button class="btn-danger" onclick="removerProduto(${idxCli}, ${idxProd})">X</button></td>
                    </tr>`;
                });

                // NOVO FORMULÁRIO ESTICADO COM FLEXBOX
                div.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <h3>${cliente.nome} <small style="color:green; font-size:12px;">(V. Caixa: R$ ${parseFloat(cliente.valorCaixa || 0).toFixed(2).replace('.',',')})</small></h3>
                        <button class="btn-danger" onclick="removerCliente(${idxCli})">Remover Cliente</button>
                    </div>
                    <div style="overflow-x:auto;">
                        <table>
                            <thead>
                                <tr><th>Qtd.</th><th>Produto</th><th>Fornecedor</th><th>V. Caixa</th><th>Modo</th><th>Vol.</th><th>Total</th><th>Ação</th></tr>
                            </thead>
                            <tbody>${rows}</tbody>
                        </table>
                    </div>
                    
                    <form class="formAddProduto" data-idx="${idxCli}" style="display:flex; gap:12px; margin-top:20px; flex-wrap:wrap; background:#f8f9fa; padding:15px; border-radius:8px; border:1px solid #e0e0e0; align-items:flex-end;">
                        <input type="hidden" class="produto-nome-hidden" required>
                        
                        <div style="display:flex; flex-direction:column; flex: 2; min-width: 140px;">
                            <label style="font-size:12px; font-weight:bold; margin-bottom:5px; color:#555;">Produto:</label>
                            <button type="button" class="btn-escolher" onclick="abrirModal(this.closest('form'))">Escolher</button>
                        </div>
                        
                        <div style="display:flex; flex-direction:column; flex: 2; min-width: 140px;">
                            <label style="font-size:12px; font-weight:bold; margin-bottom:5px; color:#555;">Fornecedor:</label>
                            <input type="text" class="fornecedor-input" style="width:100%; padding:10px; border:1px solid #ccc; border-radius:4px; box-sizing:border-box;" placeholder="Nome">
                        </div>
                        
                        <div style="display:flex; flex-direction:column; flex: 1; min-width: 80px;">
                            <label style="font-size:12px; font-weight:bold; margin-bottom:5px; color:#555;">Qtd:</label>
                            <input type="number" class="produto-qtd" value="1" min="1" step="0.5" style="width:100%; padding:10px; border:1px solid #ccc; border-radius:4px; box-sizing:border-box;" oninput="calcularVolume(this.closest('form'))">
                        </div>
                        
                        <div style="display:flex; flex-direction:column; flex: 1; min-width: 80px;">
                            <label style="font-size:12px; font-weight:bold; margin-bottom:5px; color:#555;">Modo:</label>
                            <select class="modo-preco" style="width:100%; padding:10px; border:1px solid #ccc; border-radius:4px; box-sizing:border-box;" onchange="calcularVolume(this.closest('form'))">
                                <option value="X1">X1</option><option value="X1.5">X1.5</option><option value="X2">X2</option>
                                <option value="÷2">÷2</option><option value="÷3">÷3</option><option value="÷5">÷5</option>
                            </select>
                        </div>
                        
                        <div style="display:flex; flex-direction:column; flex: 1; min-width: 80px;">
                            <label style="font-size:12px; font-weight:bold; margin-bottom:5px; color:#555;">Vol:</label>
                            <input type="number" class="produto-volumes" value="1" step="0.1" style="width:100%; padding:10px; border:1px solid #ccc; border-radius:4px; background:#e9ecef; color:#495057; cursor:not-allowed; box-sizing:border-box; font-weight:bold;" readonly tabindex="-1">
                        </div>
                        
                        <button type="submit" style="flex: 1.5; min-width: 120px; background:#28a745; color:#fff; border:none; padding:11px 15px; border-radius:4px; cursor:pointer; font-weight:bold; height: 39px;">ADICIONAR</button>
                    </form>`;
                container.appendChild(div);
            });
        };

        // --- ADIÇÃO DE CLIENTE À ROTA ---
        document.getElementById('formAddCliente').onsubmit = (e) => {
            e.preventDefault();
            const nomeSel = document.getElementById('selectCliente').value;
            const clienteObj = listaDeClientes.find(c => c.nome === nomeSel);
            if (clienteObj) {
                viagemAtual.clientes.push({ ...clienteObj, produtos: [] });
                atualizarSelectClientes();
                renderizarClientes();
                calcularValorTotal();
            }
        };

        // --- SUBMISSÃO DA INSERÇÃO DO PRODUTO ---
        document.getElementById('listaClientesContainer').addEventListener('submit', (e) => {
            if (!e.target.classList.contains('formAddProduto')) return;
            e.preventDefault();
            const form = e.target;
            const idxCli = form.dataset.idx;
            const nomeProd = form.querySelector('.produto-nome-hidden').value;
            const fornecedorProd = form.querySelector('.fornecedor-input').value;
            
            if (!nomeProd) return alert("Escolha um produto!");

            const vCaixa = parseFloat(viagemAtual.clientes[idxCli].valorCaixa || 0);
            const modo = form.querySelector('.modo-preco').value;
            const qtd = parseFloat(form.querySelector('.produto-qtd').value);
            
            let total = vCaixa * qtd;
            if (modo.startsWith('X')) total *= parseFloat(modo.replace('X', ''));
            else if (modo.startsWith('÷')) total /= parseFloat(modo.replace('÷', ''));

            viagemAtual.clientes[idxCli].produtos.push({
                nome: nomeProd,
                fornecedor: fornecedorProd,
                valor: vCaixa, 
                qtd: qtd, 
                volumes: parseFloat(form.querySelector('.produto-volumes').value),
                modoPreco: modo, 
                totalCalculado: total.toFixed(2)
            });

            calcularValorTotal(); 
            renderizarClientes();
        });

        // --- VALIDAÇÃO NO BOTÃO FINALIZAR ---
        document.getElementById('btnFinalizar').onclick = () => {
            if (viagemAtual.clientes.length === 0) {
                alert("⚠️ Selecione um cliente para iniciar a carga.");
                return;
            }
            if (viagemAtual.clientes[0].produtos.length === 0) {
                alert("⚠️ Adicione ao menos um produto antes de finalizar a carga.");
                return;
            }
            window.location.href = 'romaneio.html';
        };
        
        carregarDadosFirebase();
    </script>
</body>
</html>
